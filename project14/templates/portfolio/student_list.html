<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My portfolio </title>
</head>
<body>
    <h1>My Portfolio</h1>

    { if students %}
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>city</th>  
            </tr>
            
            </thead>
            <tbody>
                {% for student in students %}
                    <tr>
                        <td>{{ student.name }}</td>
                        <td>{{ student.age }}</td>
                        <td>{{ student.city }}</td>
                    </tr>
                {% endfor %}        
            </tbody>
            
        </table>
    {% else %}
            <p>No students found.</p>
    {% endif %}
    
</body>
</html>
